version: 1
entries:
  - id: devops.vercel.environment-separation
    title: Environment separation
    category: devops
    summary: Separate development, staging, and production environments.
    definition: Use distinct environments with independent configuration and data isolation.
    why_it_matters: Prevents accidental impact on production systems.
    priority_level: P1
    confidence_score: 0.76
    evidence_level: medium
    knowledge_layer: semi_volatile
    volatility_level: medium
    freshness_requirement: periodic_review
    use_when:
      - deploying to managed platforms with preview support
    avoid_when:
      - single environment prototypes
    implementation_rules:
      - separate environment variables and secrets
      - isolate production data
    tradeoffs:
      - higher operational overhead
    anti_patterns:
      - testing against production data
    override_allowed: true
    override_conditions:
      - early prototype with no production users
    override_risks:
      - accidental production changes
    required_justification:
      - why multiple environments are not feasible
    safer_alternatives:
      - read-only production data snapshots
    performance_impact: neutral
    security_impact: positive
    cost_impact: moderate additional environment cost
    agent_rules:
      - require prod isolation for real users
    last_verified: 2026-03-29
    verification_method: internal_review
    update_triggers:
      - platform environment model changes
    deprecation_signals:
      - platform removes environment feature
    sources:
      - Vercel deployment practices
  - id: devops.vercel.preview-deployments
    title: Preview deployments
    category: devops
    summary: Use preview deployments for every change.
    definition: Each branch or PR should generate an isolated preview environment.
    why_it_matters: Enables fast feedback and safer releases.
    priority_level: P2
    confidence_score: 0.72
    evidence_level: medium
    knowledge_layer: semi_volatile
    volatility_level: medium
    freshness_requirement: periodic_review
    use_when:
      - teams needing rapid review cycles
    avoid_when:
      - internal changes with no UI impact
    implementation_rules:
      - enforce preview checks before merge
      - seed preview data safely
    tradeoffs:
      - increased build and hosting cost
    anti_patterns:
      - merging without preview validation
    override_allowed: true
    override_conditions:
      - small changes with no user impact
    override_risks:
      - regressions reaching production
    required_justification:
      - reason preview is unnecessary
    safer_alternatives:
      - targeted staging deploys
    performance_impact: neutral
    security_impact: neutral
    cost_impact: higher build and hosting cost
    agent_rules:
      - recommend previews for UI changes
    last_verified: 2026-03-29
    verification_method: internal_review
    update_triggers:
      - changes in preview deployment behavior
    deprecation_signals:
      - platform removes preview capability
    sources:
      - Vercel documentation
  - id: devops.vercel.edge-vs-serverless
    title: Edge versus serverless functions
    category: devops
    summary: Choose edge for low latency and serverless for heavy compute.
    definition: Edge functions are best for low latency and global routing; serverless is better for heavier workloads.
    why_it_matters: Correct choice affects latency, cost, and feature support.
    priority_level: P2
    confidence_score: 0.7
    evidence_level: medium
    knowledge_layer: volatile
    volatility_level: high
    freshness_requirement: must_verify_live
    use_when:
      - deciding runtime for new endpoints
    avoid_when:
      - workload requirements are unknown
    implementation_rules:
      - profile latency and compute requirements
      - account for platform limits
    tradeoffs:
      - edge limits and cold start behavior
    anti_patterns:
      - choosing edge for heavy compute
    override_allowed: true
    override_conditions:
      - platform constraints require one runtime
    override_risks:
      - performance regressions or unsupported features
    required_justification:
      - measured workload characteristics
    safer_alternatives:
      - hybrid model with clear routing
    performance_impact: varies
    security_impact: neutral
    cost_impact: varies by runtime
    agent_rules:
      - verify platform limits before choosing edge
    last_verified: 2026-03-29
    verification_method: internal_review
    update_triggers:
      - platform runtime changes
    deprecation_signals:
      - platform deprecates a runtime
    sources:
      - Vercel runtime guidance
  - id: devops.vercel.rollback-strategy
    title: Rollback strategy
    category: devops
    summary: Ensure fast rollback of production deployments.
    definition: Keep previous deploys available and automate rollback procedures.
    why_it_matters: Reduces incident duration and customer impact.
    priority_level: P1
    confidence_score: 0.78
    evidence_level: medium
    knowledge_layer: semi_volatile
    volatility_level: medium
    freshness_requirement: periodic_review
    use_when:
      - any production deployment pipeline
    avoid_when:
      - non-production environments only
    implementation_rules:
      - keep last known good build accessible
      - test rollback workflows regularly
    tradeoffs:
      - additional deployment storage
    anti_patterns:
      - no rollback plan for production
    override_allowed: true
    override_conditions:
      - small internal app with no availability needs
    override_risks:
      - prolonged outages during regressions
    required_justification:
      - why rollback is unnecessary
    safer_alternatives:
      - manual rollback playbooks
    performance_impact: neutral
    security_impact: neutral
    cost_impact: small storage cost
    agent_rules:
      - always define rollback steps for prod
    last_verified: 2026-03-29
    verification_method: internal_review
    update_triggers:
      - release incidents requiring rollback
    deprecation_signals:
      - new platform rollback mechanism
    sources:
      - Deployment reliability practices
