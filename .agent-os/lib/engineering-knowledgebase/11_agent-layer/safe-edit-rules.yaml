version: 1
entries:
  - id: agent.safe-edit.inspect-nearby
    title: Inspect nearby files
    category: agent_layer
    summary: Read adjacent files before editing to match local patterns.
    definition: Use nearby files to infer conventions, contracts, and expected behavior.
    why_it_matters: Prevents mismatched imports, props, and file placement.
    priority_level: P1
    confidence_score: 0.8
    evidence_level: high
    knowledge_layer: stable_core
    volatility_level: low
    freshness_requirement: none
    use_when:
      - editing existing modules or components
    avoid_when:
      - isolated one-off scripts with no local context
    implementation_rules:
      - scan sibling files for naming and structure
      - reuse adjacent utilities before adding new ones
    tradeoffs:
      - small discovery time before edits
    anti_patterns:
      - editing in isolation without checking surrounding context
    override_allowed: true
    override_conditions:
      - no relevant nearby files exist
    override_risks:
      - inconsistent implementation
    required_justification:
      - reason for skipping local inspection
    safer_alternatives:
      - quick scan of the nearest related file
    performance_impact: neutral
    security_impact: neutral
    cost_impact: low
    agent_rules:
      - inspect nearby files before modifying existing code
    last_verified: 2026-04-04
    verification_method: internal_review
    update_triggers:
      - repeated mismatches with local conventions
    deprecation_signals:
      - repo introduces centralized style guide
    sources:
      - Codebase consistency practices
  - id: agent.safe-edit.contract-safety
    title: Preserve contracts and verification
    category: agent_layer
    summary: Preserve public contracts and keep the repo in a verifiable state.
    definition: Avoid breaking public interfaces; update all call sites and tests when contracts change.
    why_it_matters: Prevents broken imports, type mismatches, and failing builds.
    priority_level: P0
    confidence_score: 0.86
    evidence_level: high
    knowledge_layer: stable_core
    volatility_level: low
    freshness_requirement: none
    use_when:
      - modifying shared modules, APIs, or components
    avoid_when:
      - none
    implementation_rules:
      - keep exports and props compatible unless change is intentional
      - update call sites and tests with any contract change
      - do not leave failing lint/typecheck/build states
    tradeoffs:
      - additional updates across the codebase
    anti_patterns:
      - breaking contracts without updating dependents
    override_allowed: true
    override_conditions:
      - formal P0 exception with documented mitigation
    override_risks:
      - broken builds and regressions
    required_justification:
      - documented exception and rollback plan
    safer_alternatives:
      - backward-compatible changes with deprecation notes
    performance_impact: neutral
    security_impact: neutral
    cost_impact: higher short term, lower long term
    agent_rules:
      - preserve contracts and keep verification green
    last_verified: 2026-04-04
    verification_method: internal_review
    update_triggers:
      - regressions caused by contract breaks
    deprecation_signals:
      - formal API versioning system replaces this guidance
    sources:
      - API and contract safety practices
  - id: agent.safe-edit.minimize-blast-radius
    title: Minimize blast radius
    category: agent_layer
    summary: Keep changes focused to reduce unintended regressions.
    definition: Limit edits to the smallest set of files needed to satisfy requirements.
    why_it_matters: Reduces regression risk and review time.
    priority_level: P1
    confidence_score: 0.79
    evidence_level: medium
    knowledge_layer: stable_core
    volatility_level: low
    freshness_requirement: none
    use_when:
      - implementing new features or fixes
    avoid_when:
      - broader refactor is explicitly requested
    implementation_rules:
      - avoid large renames unless required
      - change only what is necessary to pass verification
    tradeoffs:
      - may leave some cleanup for later
    anti_patterns:
      - unrelated refactors bundled with feature work
    override_allowed: true
    override_conditions:
      - user explicitly requests refactor
    override_risks:
      - larger change surface and regressions
    required_justification:
      - explanation of why broader edits are necessary
    safer_alternatives:
      - separate cleanup task after verification passes
    performance_impact: neutral
    security_impact: neutral
    cost_impact: lower short term
    agent_rules:
      - keep edits small and focused
    last_verified: 2026-04-04
    verification_method: internal_review
    update_triggers:
      - repeated regressions from large edit scope
    deprecation_signals:
      - formal refactor policy replaces this
    sources:
      - Safe edit practices
