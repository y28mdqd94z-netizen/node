version: 1
entries:
  - id: errors.user-safe-messages
    title: User safe error messages
    category: system_quality
    summary: Provide clear errors without leaking sensitive data.
    definition: Error messages should be actionable but not expose internals or sensitive data.
    why_it_matters: Protects security and improves user experience.
    priority_level: P0
    confidence_score: 0.86
    evidence_level: high
    knowledge_layer: stable_core
    volatility_level: low
    freshness_requirement: none
    use_when:
      - any user-facing error
    avoid_when:
      - internal debugging logs
    implementation_rules:
      - show user-friendly message
      - log detailed error server-side only
    tradeoffs:
      - less immediate detail for users
    anti_patterns:
      - exposing stack traces to users
    override_allowed: true
    override_conditions:
      - internal tools with no external exposure
    override_risks:
      - information leakage
    required_justification:
      - system access is fully internal and controlled
    safer_alternatives:
      - toggle detailed errors behind admin access
    performance_impact: neutral
    security_impact: positive
    cost_impact: neutral
    agent_rules:
      - never expose internals in user-facing errors
    last_verified: 2026-03-29
    verification_method: internal_review
    update_triggers:
      - incident involving data leakage via errors
    deprecation_signals:
      - centralized error system handles messaging
    sources:
      - Secure error handling guidance
  - id: errors.retry-backoff
    title: Retry with exponential backoff
    category: system_quality
    summary: Use controlled retries for transient failures.
    definition: Retry transient errors with backoff and jitter to avoid thundering herds.
    why_it_matters: Improves reliability without overwhelming dependencies.
    priority_level: P1
    confidence_score: 0.82
    evidence_level: high
    knowledge_layer: stable_core
    volatility_level: low
    freshness_requirement: none
    use_when:
      - network calls and transient failures
    avoid_when:
      - non-idempotent operations without safeguards
    implementation_rules:
      - cap retry attempts
      - use exponential backoff with jitter
    tradeoffs:
      - increased latency on failure paths
    anti_patterns:
      - immediate tight-loop retries
    override_allowed: true
    override_conditions:
      - dependency does not tolerate retries
    override_risks:
      - reduced resilience to transient issues
    required_justification:
      - dependency contract forbids retries
    safer_alternatives:
      - single retry with timeout
    performance_impact: neutral to negative on failure
    security_impact: neutral
    cost_impact: small additional compute
    agent_rules:
      - use backoff for all transient network calls
    last_verified: 2026-03-29
    verification_method: internal_review
    update_triggers:
      - dependency instability incidents
    deprecation_signals:
      - platform provides built-in retry management
    sources:
      - Resilience patterns
  - id: errors.circuit-breaker
    title: Circuit breaker for unstable dependencies
    category: system_quality
    summary: Stop calling failing dependencies temporarily.
    definition: Detect failure thresholds and short-circuit calls until recovery.
    why_it_matters: Prevents cascading failures and protects core systems.
    priority_level: P1
    confidence_score: 0.78
    evidence_level: high
    knowledge_layer: stable_core
    volatility_level: low
    freshness_requirement: none
    use_when:
      - dependencies with variable availability
    avoid_when:
      - internal in-process calls
    implementation_rules:
      - define failure thresholds and reset windows
      - provide fallback responses
    tradeoffs:
      - potential temporary feature loss
    anti_patterns:
      - infinite retries without circuit breaking
    override_allowed: true
    override_conditions:
      - dependency has strict reliability guarantees
    override_risks:
      - cascading failures
    required_justification:
      - evidence of reliable dependency behavior
    safer_alternatives:
      - aggressive timeouts and limited retries
    performance_impact: positive for stability
    security_impact: neutral
    cost_impact: neutral
    agent_rules:
      - apply circuit breakers on critical external calls
    last_verified: 2026-03-29
    verification_method: internal_review
    update_triggers:
      - dependency outage incidents
    deprecation_signals:
      - platform managed circuit breakers
    sources:
      - Resilience engineering guidance
  - id: errors.idempotent-retry
    title: Idempotent retries for writes
    category: system_quality
    summary: Ensure retries of writes do not duplicate side effects.
    definition: Use idempotency keys or deterministic IDs for write retries.
    why_it_matters: Prevents duplicate actions during failures.
    priority_level: P1
    confidence_score: 0.8
    evidence_level: high
    knowledge_layer: stable_core
    volatility_level: low
    freshness_requirement: none
    use_when:
      - any write operation with retry logic
    avoid_when:
      - reads or idempotent writes by design
    implementation_rules:
      - persist idempotency keys with expiry
      - return same result on duplicate keys
    tradeoffs:
      - extra storage and lookup overhead
    anti_patterns:
      - retrying writes without deduplication
    override_allowed: true
    override_conditions:
      - writes are already deterministic and idempotent
    override_risks:
      - duplicate records or charges
    required_justification:
      - proof of idempotency
    safer_alternatives:
      - client-generated deterministic IDs
    performance_impact: slight negative
    security_impact: neutral
    cost_impact: small storage cost
    agent_rules:
      - require idempotency on write retries
    last_verified: 2026-03-29
    verification_method: internal_review
    update_triggers:
      - duplicate write incidents
    deprecation_signals:
      - deterministic IDs adopted everywhere
    sources:
      - API reliability practices
  - id: errors.centralized-error-model
    title: Centralized error model
    category: system_quality
    summary: Use a shared error taxonomy across services.
    definition: Map internal errors to a consistent set of error codes and categories.
    why_it_matters: Enables consistent handling and reporting across systems.
    priority_level: P1
    confidence_score: 0.76
    evidence_level: medium
    knowledge_layer: stable_core
    volatility_level: low
    freshness_requirement: none
    use_when:
      - multiple services used by the same clients
    avoid_when:
      - single service with limited consumers
    implementation_rules:
      - define standard error codes and severity
      - document mapping in API contracts
    tradeoffs:
      - effort to maintain shared taxonomy
    anti_patterns:
      - inconsistent error codes across services
    override_allowed: true
    override_conditions:
      - single service with no shared clients
    override_risks:
      - inconsistent error handling by clients
    required_justification:
      - rationale for local error model
    safer_alternatives:
      - minimal shared error codes for critical paths
    performance_impact: neutral
    security_impact: neutral
    cost_impact: modest maintenance effort
    agent_rules:
      - enforce shared error taxonomy for multi-service systems
    last_verified: 2026-03-29
    verification_method: internal_review
    update_triggers:
      - client issues due to inconsistent errors
    deprecation_signals:
      - move to unified API gateway error mapping
    sources:
      - API error handling practices
