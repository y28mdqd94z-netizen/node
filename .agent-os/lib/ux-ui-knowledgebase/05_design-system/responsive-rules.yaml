responsive:
  breakpoints:
    xs: 360
    sm: 600
    md: 900
    lg: 1200
    xl: 1440

  rules:
    - "Prioritize core content on small screens."
    - "Collapse secondary navigation into menus on mobile."
    - "Increase touch target size on small screens."
    - "Avoid multi-column forms on mobile."
    - "Use sticky CTAs for long mobile flows."

  layout_guidelines:
    - "Use a 12-column grid on desktop, 4-6 on mobile."
    - "Maintain consistent gutters across breakpoints."
