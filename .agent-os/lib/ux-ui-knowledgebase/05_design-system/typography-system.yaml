typography:
  font_families:
    primary: "SF Pro Text, SF Pro Display, -apple-system, system-ui, Segoe UI, Helvetica Neue, Arial, sans-serif"
    monospace: "SF Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace"

  base_size: 16
  scale:
    - name: "xs"
      size: 12
      line_height: 16
      weight: 400
    - name: "sm"
      size: 14
      line_height: 20
      weight: 400
    - name: "base"
      size: 16
      line_height: 24
      weight: 400
    - name: "lg"
      size: 18
      line_height: 26
      weight: 500
    - name: "xl"
      size: 20
      line_height: 28
      weight: 600
    - name: "2xl"
      size: 24
      line_height: 32
      weight: 600
    - name: "3xl"
      size: 28
      line_height: 36
      weight: 600

  text_styles:
    - name: "H1"
      size: 28
      line_height: 36
      weight: 600
    - name: "H2"
      size: 24
      line_height: 32
      weight: 600
    - name: "H3"
      size: 20
      line_height: 28
      weight: 600
    - name: "Body"
      size: 16
      line_height: 24
      weight: 400
    - name: "Small"
      size: 14
      line_height: 20
      weight: 400
    - name: "Caption"
      size: 12
      line_height: 16
      weight: 400

  guidelines:
    - "Limit to 2 font families."
    - "Use weight and spacing to create hierarchy before introducing new sizes."
    - "Use sentence case for headings and labels."
    - "Avoid all-caps for long text."
