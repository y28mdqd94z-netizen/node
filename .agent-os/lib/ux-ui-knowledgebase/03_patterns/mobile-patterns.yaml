pattern_bottom_nav:
  pattern_name: "Bottom Navigation"
  problem_solved: "Provides easy access to primary sections on mobile."
  context: "Mobile apps with 3-5 main destinations."
  structure:
    - "Icon and label for each tab"
    - "Active state highlight"
  core_elements: ["Tab bar", "Icons", "Labels"]
  variants:
    - "Scrollable tab bar"
    - "Center action button"
  best_for: "Frequent navigation between top-level sections."
  avoid_for: "More than 5 primary destinations."
  desktop_considerations: "Not applicable."
  mobile_considerations: "Keep labels short and icons clear."
  accessibility_notes: "Ensure labels are visible and focusable."
  behaviour_rules: "Persist active tab state."
  related_components: ["Tab bar", "Icon"]
  related_principles: ["Fitts's Law", "Consistency and Standards"]
  anti_patterns:
