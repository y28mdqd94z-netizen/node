responsive_rules:
  breakpoints:
    xs: 360
    sm: 600
    md: 900
    lg: 1200
    xl: 1440

  layout_rules:
    - "Use a single column below md for primary flows."
    - "Collapse secondary navigation into drawers below md."
    - "Increase touch target size and spacing on xs/sm."
    - "Avoid multi-column forms below md."
    - "Use sticky primary action for long mobile flows."

  density_switching:
    - "Default density on md and above; comfortable on sm and below."
    - "Compact density only for data-dense workflows on md+ and only if readability passes."

  container_rules:
    - "Max content width 1200px for dashboards; 720px for reading flows."
    - "Maintain consistent gutters per breakpoint."

