matrix:
  - job: "Choose one from a small set (<= 5)"
    primary_component: "Radio Group"
    alternatives: ["Segmented Control"]
    use_when: "All options are equally important and visible."
    avoid_when: "Options are long or numerous."
    notes: "Keep labels short and clear."

  - job: "Choose one from a large set"
    primary_component: "Select"
    alternatives: ["Combobox", "Autocomplete"]
    use_when: "Options exceed 5 or require search."
    avoid_when: "Only 2-3 options."
    notes: "Provide typeahead when list is long."

  - job: "Choose multiple options"
    primary_component: "Checkbox Group"
    alternatives: ["Multi-select", "Token input"]
    use_when: "Multiple selections are allowed."
    avoid_when: "Only one option should be selected."
    notes: "Include 'Select all' if list is long."

  - job: "Toggle a setting"
    primary_component: "Switch"
    alternatives: ["Checkbox"]
    use_when: "Immediate on/off state."
    avoid_when: "Requires confirmation or multiple choices."
    notes: "Label should describe the state, not the action."

  - job: "Enter short text"
    primary_component: "Text Input"
    alternatives: ["Inline edit"]
    use_when: "Single-line input."
    avoid_when: "Long-form content."
    notes: "Always include a label."

  - job: "Enter long text"
    primary_component: "Textarea"
    alternatives: ["Rich text editor"]
    use_when: "Multi-paragraph input."
    avoid_when: "Short labels or single-line values."
    notes: "Provide character count if limits apply."

  - job: "Confirm destructive action"
    primary_component: "Confirmation Dialog"
    alternatives: ["Inline confirmation"]
    use_when: "Action is irreversible or high impact."
    avoid_when: "Low-risk actions."
    notes: "Offer undo when possible."

  - job: "Show status or category"
    primary_component: "Badge"
    alternatives: ["Tag", "Chip"]
    use_when: "Compact status indicators."
    avoid_when: "Long descriptive text."
    notes: "Do not rely on color alone."

  - job: "Navigate between pages"
    primary_component: "Pagination"
    alternatives: ["Infinite scroll"]
    use_when: "Users need predictable page boundaries."
    avoid_when: "Continuous discovery browsing."
    notes: "Provide page size control if needed."

  - job: "Provide feedback"
    primary_component: "Toast"
    alternatives: ["Inline Alert", "Banner"]
    use_when: "Non-blocking confirmation."
    avoid_when: "Critical errors or required actions."
    notes: "Use banners for system-wide issues."
