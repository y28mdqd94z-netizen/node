principle_accessibility:
  title: "Accessibility and Inclusion"
  summary: "Design for diverse abilities, devices, and contexts."
  why_it_matters: "Accessible systems reach more users and reduce legal risk."
  applies_to: "Color, typography, input, motion, and semantics."
  do:
    - "Meet contrast and touch target guidelines."
    - "Ensure keyboard and screen reader support."
  dont:
    - "Convey meaning by color alone."
  related_laws: ["Fitts's Law"]
  signals_of_good_use: "No critical blockers in keyboard-only use."
  signals_of_bad_use: "Users cannot complete tasks without a mouse."
  agent_rules: "Treat accessibility as a baseline, not an enhancement."
  tags: ["accessibility", "inclusive_design"]
  sources: ["WCAG 2.2", "WAI-ARIA Authoring Practices"]
  priority: P1
  evidence_level: C
  confidence: 0.7
  enforcement: soft
