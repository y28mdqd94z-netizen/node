principle_consistency:
  title: "Consistency and Standards"
  summary: "Use familiar patterns and consistent wording, layout, and behavior."
  why_it_matters: "Consistency reduces learning time, prevents errors, and builds trust."
  applies_to: "Navigation, forms, labels, iconography, and interaction patterns."
  do:
    - "Reuse established components and placements."
    - "Keep terminology consistent across screens."
    - "Follow platform conventions for navigation and controls."
  dont:
    - "Rename the same concept in different areas."
    - "Change button styles for the same action."
  related_laws: ["Jakob's Law", "Mental Models"]
  signals_of_good_use: "Users can predict outcomes and move quickly."
  signals_of_bad_use: "Users hesitate or ask where features moved."
  agent_rules: "Prefer existing patterns; document any deviations with rationale."
  tags: ["consistency", "standards", "learnability"]
  sources: ["Nielsen Norman Group: Consistency and Standards"]
  priority: P0
  evidence_level: A
  confidence: 0.9
  enforcement: hard
  stability: stable
  override_allowed: false
  override_conditions: "Not applicable."
  override_risks: "Legal and ethical failure; blocked users."
  required_justification: "Not applicable."
  safer_alternatives: "Rework design to meet contrast and input accessibility."
  decision_checks:
    - "Signals of good use are observed in testing."
    - "Task success or error rate improves relative to baseline."

principle_visibility:
  title: "Visibility of System Status"
  summary: "Keep users informed about what is happening through clear feedback."
  why_it_matters: "Timely feedback builds confidence and prevents repeated actions."
  applies_to: "Loading states, background processing, and long-running tasks."
  do:
    - "Show progress indicators for operations over 400ms."
    - "Confirm actions with inline feedback or toasts."
  dont:
    - "Leave users guessing whether an action worked."
  related_laws: ["Doherty Threshold"]
  signals_of_good_use: "Users wait calmly and do not repeat clicks."
  signals_of_bad_use: "Repeated clicks, refreshes, or abandonment."
  agent_rules: "Every user action should trigger immediate visible feedback."
  tags: ["feedback", "system_status"]
  sources: ["Nielsen Norman Group: Visibility of System Status"]
  priority: P1
  evidence_level: C
  confidence: 0.7
  enforcement: soft
  stability: stable
  override_allowed: true
  override_conditions: "Deviation requires explicit rationale and mitigation."
  override_risks: "Ignoring the principle increases errors or user confusion."
  required_justification: "State the context and how impact will be measured."
  safer_alternatives: "Use progressive disclosure or additional guidance instead of full deviation."
  decision_checks:
    - "Signals of good use are observed in testing."
    - "Task success or error rate improves relative to baseline."

principle_user_control:
  title: "User Control and Freedom"
  summary: "Support undo, cancel, and clear exits from unwanted states."
  why_it_matters: "Users recover from mistakes without anxiety."
  applies_to: "Destructive actions, multi-step flows, and navigation."
  do:
    - "Provide undo for reversible actions."
    - "Include clear cancel or back paths."
  dont:
    - "Trap users in modal flows without exits."
  related_laws: ["Tesler's Law"]
  signals_of_good_use: "Users explore confidently and recover from errors."
  signals_of_bad_use: "Users abandon flows due to fear of mistakes."
  agent_rules: "If an action is destructive, require confirmation and offer undo."
  tags: ["control", "recovery", "safety"]
  sources: ["Nielsen Norman Group: User Control and Freedom"]
  priority: P1
  evidence_level: C
  confidence: 0.7
  enforcement: soft
  stability: stable
  override_allowed: true
  override_conditions: "Deviation requires explicit rationale and mitigation."
  override_risks: "Ignoring the principle increases errors or user confusion."
  required_justification: "State the context and how impact will be measured."
  safer_alternatives: "Use progressive disclosure or additional guidance instead of full deviation."
  decision_checks:
    - "Signals of good use are observed in testing."
    - "Task success or error rate improves relative to baseline."

principle_recognition:
  title: "Recognition Over Recall"
  summary: "Make options visible so users do not have to remember them."
  why_it_matters: "Reduces cognitive load and speeds task completion."
  applies_to: "Menus, settings, and form assistance."
  do:
    - "Expose common actions in context."
    - "Use labels and visible affordances."
  dont:
    - "Hide key actions behind ambiguous icons."
  related_laws: ["Miller's Law", "Serial Position Effect"]
  signals_of_good_use: "Users find features without instruction."
  signals_of_bad_use: "Users rely on search or help for basic tasks."
  agent_rules: "Prefer visible options over hidden gestures."
  tags: ["memory", "discoverability"]
  sources: ["Nielsen Norman Group: Recognition over Recall"]
  priority: P1
  evidence_level: C
  confidence: 0.7
  enforcement: soft
