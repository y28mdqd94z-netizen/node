principle_minimalism:
  title: "Aesthetic and Minimalist Design"
  summary: "Avoid unnecessary elements and highlight what matters."
  why_it_matters: "Clutter hides signal and slows decision making."
  applies_to: "Layouts, data tables, and marketing pages."
  do:
    - "Prioritize essential content and actions."
    - "Use whitespace to create focus."
  dont:
    - "Add decoration that competes with functional content."
  related_laws: ["Occam's Razor", "Hick's Law"]
  signals_of_good_use: "Users find the primary action quickly."
  signals_of_bad_use: "Users miss key actions or misread priorities."
  agent_rules: "If an element does not serve a goal, remove it."
  tags: ["clarity", "focus"]
  sources: ["Nielsen Norman Group: Aesthetic and Minimalist Design"]
  priority: P1
  evidence_level: C
