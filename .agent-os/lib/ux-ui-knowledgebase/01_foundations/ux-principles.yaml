principle_flexibility:
  title: "Flexibility and Efficiency"
  summary: "Support both novice and expert workflows."
  why_it_matters: "Experts need speed; novices need guidance."
  applies_to: "Complex tools, dashboards, and repetitive tasks."
  do:
    - "Provide shortcuts and bulk actions."
    - "Allow customization of views."
  dont:
    - "Force experts through slow, step-by-step flows."
  related_laws: ["Pareto Principle"]
  signals_of_good_use: "Power users complete tasks quickly without errors."
  signals_of_bad_use: "Users create workarounds or rely on exports."
  agent_rules: "Offer a simple path plus optional accelerators."
  tags: ["efficiency", "power_users"]
  sources: ["Nielsen Norman Group: Flexibility and Efficiency"]
