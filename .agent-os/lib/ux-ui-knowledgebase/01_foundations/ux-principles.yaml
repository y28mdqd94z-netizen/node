    - "Task success or error rate improves relative to baseline."

principle_error_prevention:
  title: "Error Prevention"
  summary: "Prevent problems before they occur with constraints and guidance."
  why_it_matters: "Prevention costs less than recovery for users and support."
  applies_to: "Forms, destructive actions, data entry."
  do:
    - "Validate input early and inline."
    - "Disable actions that are not available."
  dont:
    - "Allow irreversible actions without confirmation."
  related_laws: ["Poka-Yoke", "Cognitive Load Theory"]
  signals_of_good_use: "Low error rates and few support requests."
  signals_of_bad_use: "Frequent error messages after submission."
  agent_rules: "Add guardrails for destructive or costly actions."
  tags: ["errors", "validation"]
  sources: ["Nielsen Norman Group: Error Prevention"]
  priority: P1
  evidence_level: C
  confidence: 0.7
  enforcement: soft
