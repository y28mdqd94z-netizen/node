ux_law_hicks:
  title: "Hick’s Law"
  category: "UX Laws"
  summary: "Decision time grows with the number and complexity of choices【2†L36-L42】."
  definition: "Hick’s Law (Hick-Hyman Law) states that decision time increases as options multiply. In software, more menu items or complex choices lead to slower user responses due to higher cognitive load【2†L36-L42】."
  why_it_matters: "Limiting choices speeds decisions【2†L36-L42】, reducing cognitive burden. Excess options can overwhelm users and cause drop-off."
  applies_to: "Menus, settings panels, dashboards, and any interface with multiple clickable options."
  use_when: "Presenting tasks or features: group and limit top-level options, use progressive disclosure for secondary choices."
  avoid_when: "Features are inherently complex (cannot be simplified) or when users must see all options (e.g. search filters by necessity)."
  signals_of_good_use: "Quick user decisions, minimal clicks or taps, high completion rates, low help requests."
  signals_of_bad_use: "User hesitates, abandons flow, requests simpler UI, frequent use of search/default or support."
  tradeoffs: "Fewer options may require extra clicks (deep navigation). Conversely, showing all options reveals features but slows users."
  related_principles: ["Miller’s Law", "Pareto Principle", "Cognitive Load Theory"]
  common_mistakes: "Overloading navigation menus; displaying rarely-used features upfront; skipping categorization."
  examples:
    - "Google: minimal homepage with just search (two buttons) exemplifies Hick’s Law by offering only core choices【2†L53-L61】."
    - "Slack onboarding: hides most features initially, revealing them via chatbot to avoid overwhelming new users【2†L74-L82】."
  implementation_notes: "Use progressive disclosure or wizards for complex setups. Prioritize most-used actions. A/B test menu sizes."
  accessibility_notes: "Ensure keyboard and screen-reader navigation still reveal all options (e.g. by expand/collapse). Use clear headings for hidden sections."
  agent_rules: "If option count > 5, group or hide some. Order by frequency. Provide search or quick-access as needed."
  confidence: 0.9
  priority: P1
  evidence_level: B
  enforcement: soft
  stability: stable
  override_allowed: true
  override_conditions: "Deviation requires explicit rationale and mitigation."
  override_risks: "Violating the law increases cognitive load or error rate."
  required_justification: "State the context and how impact will be measured."
  safer_alternatives: "Use progressive disclosure or additional cues instead of full deviation."
  tags: ["decision-making", "cognitive_load", "menu_design"]
  sources: ["Laws of UX: Hick’s Law【2†L36-L42】", "Interaction Design Foundation: Hick’s Law【26†L65-L73】"]

ux_law_fitts:
  title: "Fitts’s Law"
  category: "UX Laws"
  summary: "Time to acquire a target is a function of distance and size【4†L125-L134】【6†L178-L186】."
  definition: "Fitts’s Law states that target acquisition time grows with distance and decreases with target size【4†L125-L134】. In UI, larger and closer buttons are faster to click."
  why_it_matters: "Optimizing size and placement reduces effort. Key actions (e.g. primary buttons) should be large; aligning with edges makes them effectively larger【6†L216-L225】."
  applies_to: "Buttons, links, icons, menu items on desktop and touchscreen (but note differences)."
  use_when: "Designing clickable targets: use large interactive areas for important actions; put menus/edges strategically."
  avoid_when: "Targets are already large or edge-bound by default (e.g. screen corners in desktop UIs)."
  signals_of_good_use: "Fast clicks with few misses; important actions placed at screen edges or large."
  signals_of_bad_use: "Frequent mis-clicks on small items; slow pointing/click times; complaints about difficulty."
  tradeoffs: "Larger targets may crowd UI; may need to omit or group less important items. On small screens, too many large targets can limit space."
  related_principles: ["Doherty Threshold", "Precision vs. Speed trade-off", "Accessibility: target size guidelines"]
  common_mistakes: "Small touch areas, especially icons without padding; confusing non-clickable whitespace; ignoring the desktop vs. touch context."
  examples:
    - "Desktop OS menus placed on screen edges (infinite target) accelerate clicks【6†L216-L225】."
    - "Buttons with icon+label have larger click areas than icon alone【6†L178-L186】."
  implementation_notes: "Make whole element (including label) clickable. Use padding. On desktop, leverage edges (e.g. Mac menu bar); on mobile, avoid edge-only targets as palm resting differs."
  accessibility_notes: "Follow minimum touch-size guidelines (e.g. 44px on mobile). Ensure space between items to avoid overlap."
  agent_rules: "Maximize clickable area for important buttons. Check spacing between clickable elements. Place critical actions at UI boundaries if on desktop."
  confidence: 0.9
  priority: P1
  evidence_level: B
  enforcement: soft
  stability: stable
  override_allowed: true
  override_conditions: "Deviation requires explicit rationale and mitigation."
  override_risks: "Violating the law increases cognitive load or error rate."
  required_justification: "State the context and how impact will be measured."
  safer_alternatives: "Use progressive disclosure or additional cues instead of full deviation."
  tags: ["input_performance", "touch_targets", "menu_design"]
  sources: ["Nielsen Norman Group: Fitts’s Law【4†L125-L134】【6†L178-L186】"]

ux_law_jakobs:
  title: "Jakob’s Law"
  category: "UX Laws"
  summary: "Users spend most time on other sites; they prefer familiar interfaces【8†L36-L41】."
  definition: "Jakob’s Law: People expect your site/app to work like others they know【8†L36-L41】. Use familiar patterns to leverage existing mental models."
  why_it_matters: "Consistency with common UI patterns reduces learning time【8†L44-L50】 and frustration. Abrupt changes break user expectations."
  applies_to: "Navigation placement, icon meanings, overall layout and flow."
  use_when: "Designing core functionality: reuse standard conventions (e.g. menu on top or left, gear icon for settings)."
  avoid_when: "Introducing truly novel features where standard patterns won’t serve (then provide training or tours)."
  signals_of_good_use: "Users immediately understand interface; transfer skills from other tools; high initial success."
  signals_of_bad_use: "Confusion when elements are placed or labeled unexpectedly; feedback like “where is X?”"
  tradeoffs: "Mimicking others may stifle innovation; balance novelty with cues (e.g. keep key workflows familiar)."
  related_principles: ["Mental Models", "Consistency and Standards", "Convention"]
  common_mistakes: "Deviating from platform norms (e.g. web-style sidebar on mobile); using unconventional icons without labels."
  examples:
    - "Switching users: YouTube’s redesign allowed users to preview and revert to old design to ease transition【8†L65-L70】."
    - "Common Form Controls: Digital toggles/radios mimic physical controls for instant familiarity【8†L58-L66】."
  implementation_notes: "Follow OS/platform standards (iOS vs Android). Use recognizable icons (e.g. hamburger for menu). For changes, use gradual updates or optional opt-in."
  accessibility_notes: "Provide descriptive labels/tooltips for icons to reinforce meaning; ensure no critical functionality is hidden behind nonstandard controls."
  agent_rules: "Default to common patterns from mature platforms; if a new design deviates, ensure guidance or alternative familiar modes."
  confidence: 0.85
  priority: P1
  evidence_level: B
  enforcement: soft
  stability: stable
  override_allowed: true
  override_conditions: "Deviation requires explicit rationale and mitigation."
  override_risks: "Violating the law increases cognitive load or error rate."
  required_justification: "State the context and how impact will be measured."
  safer_alternatives: "Use progressive disclosure or additional cues instead of full deviation."
  tags: ["convention", "user_expectation", "pattern_library"]
  sources: ["Laws of UX: Jakob’s Law【8†L36-L41】【8†L44-L50】"]

ux_law_millers:
  title: "Miller’s Law"
  category: "UX Laws"
  summary: "People can hold ~7±2 items in working memory【10†L36-L40】."
  definition: "Miller’s Law states that average people can keep about 7 (±2) items in short-term memory【10†L36-L40】."
  why_it_matters: "Avoid overwhelming users. Chunk related information, reduce list lengths, and minimize memory load in interfaces【10†L42-L50】."
  applies_to: "List items, form fields, navigation menus, and any sequential data presentation."
  use_when: "Designing menus or information lists: break into subcategories or progressive steps to avoid too many items at once."
  avoid_when: "When exact item count is critical to user (e.g. showing all categories for transparency)."
  signals_of_good_use: "User easily scans and recalls options; low error rates due to memory lapses."
  signals_of_bad_use: "Users skip content, rely on search instead of navigating, frequently use 'back' due to confusion."
  tradeoffs: "More but shorter lists vs longer deep paths. Provide search or filters as alternative."
  related_principles: ["Chunking", "Recognition over Recall", "Cognitive Load Theory"]
  common_mistakes: "Unnecessarily splitting content into many tiny pages (fragmentation); or dumping long lists on one page without grouping."
  examples:
    - "Menu chunking: Group related navigation links under headings (Settings, Profile, Billing)."
    - "Wizard forms: multi-step sign-up forms keep only few fields per step, leveraging Miller’s Law for reduced load."
  implementation_notes: "Use bullet lists, accordions, tabs to group content. Label sections clearly. Provide breadcrumbs to reduce memory of previous steps."
  accessibility_notes: "Maintain visible context (breadcrumbs, progress indicator) to reduce reliance on memory. Ensure toggles/sections are announced in screen readers."
  agent_rules: "Limit visible options to ~5-7 at a time; use progressive disclosure for additional items; test with novices."
  confidence: 0.9
  priority: P1
  evidence_level: B
  enforcement: soft
  stability: stable
  override_allowed: true
  override_conditions: "Deviation requires explicit rationale and mitigation."
  override_risks: "Violating the law increases cognitive load or error rate."
  required_justification: "State the context and how impact will be measured."
  safer_alternatives: "Use progressive disclosure or additional cues instead of full deviation."
  tags: ["memory_limits", "chunking", "menu_design"]
  sources: ["Laws of UX: Miller’s Law【10†L36-L40】【10†L44-L49】"]

ux_law_teslers:
  title: "Tesler’s Law"
  category: "UX Laws"
  summary: "Some complexity cannot be eliminated, only moved between system and user【12†L36-L44】."
  definition: "Tesler’s Law (Conservation of Complexity) states every system has inherent complexity that cannot be removed【12†L36-L44】."
  why_it_matters: "Designers must decide whether complexity is handled by the system or the user. Put effort in to simplify user tasks, but recognize some complexity may remain."
  applies_to: "Feature-rich applications, complex workflows, or any system requiring sophisticated user input."
  use_when: "Building features that may be complex: strive to handle complexity behind scenes (automation, defaults) so users do less."
  avoid_when: "Attempting to oversimplify critical tasks to the point of hiding functionality or user control."
  signals_of_good_use: "Users accomplish tasks with guidance; system automates calculations or defaults; minimal manual steps."
  signals_of_bad_use: "Users are confused by buried features; system forces them to memorize or perform complex steps manually."
  tradeoffs: "Automating complexity saves user time but can remove control/visibility. Exposing complexity ensures flexibility but increases user burden."
  related_principles: ["Automation vs Control", "Mental Models"]
  common_mistakes: "Hiding all options makes system inflexible; giving full control with no defaults overloads users."
  examples:
    - "Spreadsheet formulas: Excel provides functions (system handles math) vs. requiring users to compute manually."
    - "E-commerce shipping: sites store address once (system complexity) rather than ask users every time."
  implementation_notes: "Use smart defaults, wizards, tooltips to offload complexity. Where complexity remains, provide education (help text, tutorials)."
  accessibility_notes: "Ensure that any automation still allows user override; provide explanations for unexpected behavior (e.g. accessible tooltips)."
  agent_rules: "Favor designs that automate user work when safe. Identify user pain points and reduce manual steps. If complexity stays, surface guidance."
  confidence: 0.85
  priority: P1
  evidence_level: B
  enforcement: soft
  stability: stable
  override_allowed: true
  override_conditions: "Deviation requires explicit rationale and mitigation."
  override_risks: "Violating the law increases cognitive load or error rate."
  required_justification: "State the context and how impact will be measured."
  safer_alternatives: "Use progressive disclosure or additional cues instead of full deviation."
  tags: ["complexity", "automation", "user-control"]
  sources: ["Laws of UX: Tesler’s Law【12†L36-L44】"]

ux_law_peak_end:
  title: "Peak–End Rule"
  category: "UX Laws"
  summary: "People judge experiences by their most intense moment and the end【14†L36-L40】."
  definition: "The Peak–End Rule states that memory of an experience is determined by its peak (best/worst) and its end【14†L34-L40】."
  why_it_matters: "Focus on creating positive ‘peak’ moments and a strong finish. A smooth final step or delightful surprise can outweigh minor issues."
  applies_to: "Critical flows like onboarding completion, checkout, or any multi-step process."
  use_when: "Designing the final steps or rewards in a process (e.g. confirmation pages, success messages)."
  avoid_when: "Using trivial peeks to mask systemic issues (subpar core flows should be fixed first)."
  signals_of_good_use: "High satisfaction ratings despite some friction, positive user testimonials about outcome."
  signals_of_bad_use: "Users remember last (frustrating) step and complain, even if earlier steps were smooth."
  tradeoffs: "Extra polish at end (animation, reward) vs. basic completion. Do not ignore first steps, but allocate efforts to key moments."
  related_principles: ["Zeigarnik Effect", "Emotional Design"]
  common_mistakes: "Ending with bland confirmation; neglecting error states that become negative peaks."
  examples:
    - "Mailchimp’s signup: uses humorous, branded illustration on success to leave a positive final impression【14†L58-L64】."
    - "Uber: reduces wait-time friction and clarifies final steps to avoid ending on a negative (cancellation) peak【14†L65-L73】."
  implementation_notes: "Incorporate micro-animations or messages at completion. Offer small rewards or feedback (e.g. progress bars filling, certificates, congratulatory text)."
  accessibility_notes: "Ensure any animations or sound at end can be skipped or are friendly. Provide text alternatives for visual cues."
  agent_rules: "Identify the ‘end’ of each user journey and optimize it (clear messaging, simple choices). Highlight accomplishments (percent complete, milestones)."
  confidence: 0.8
