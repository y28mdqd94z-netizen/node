ux_law_progressive_disclosure:
  title: "Progressive Disclosure"
  category: "UX Principles"
  summary: "Show only the necessary, hide advanced options until needed【26†L65-L73】."
  definition: "Progressive Disclosure defers advanced or rarely-used features to secondary views, making applications easier to learn and less error-prone【26†L65-L73】."
  why_it_matters: "Reduces initial complexity for new or casual users【26†L125-L134】. Novice users see core tasks; power users can access additional options on demand."
  applies_to: "Complex forms, advanced settings, help content, feature onboarding."
  use_when: "Features are numerous or complex: hide secondary options under 'Advanced', 'More', or multi-step flows."
  avoid_when: "Over-hiding critical information; if user must access advanced options frequently, consider promoting them instead."
  signals_of_good_use: "Faster learning for beginners; fewer errors on first use; advanced users still complete tasks by discovering extras."
  signals_of_bad_use: "Users unaware of hidden features; frustration at not finding expected options."
  tradeoffs: "Extra clicks for power users to find advanced features vs. simpler initial view for others. Ensure discovery paths."
  related_principles: ["Cognitive Load Theory", "Chunking"]
  common_mistakes: "Hiding help or instructions too deep; burying vital options (like print settings) out of sight【26†L77-L85】."
  examples:
    - "Print dialog: basic options first, with an ‘Advanced’ button for rarely used settings【26†L85-L94】."
    - "Onboarding tours: show essential tips initially, keep advanced tips or shortcuts for later learning phases."
  implementation_notes: "Label disclosure controls clearly. Use progressive steps (wizard). Keep visible cues (e.g. 'More options')."
  agent_rules: "Default to progressive reveal when option count is large; ensure navigation paths exist to hidden sections; favor initial simplicity."
