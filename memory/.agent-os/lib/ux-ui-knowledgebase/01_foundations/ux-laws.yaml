ux_law_occams:
  title: "Occam’s Razor"
  category: "UX Laws"
  summary: "Among solutions, the simplest is usually best."
  definition: "Occam’s Razor (principle of parsimony) advises favoring the solution with the fewest assumptions【24†L107-L114】. In design, this means stripping unnecessary complexity until only what is needed remains."
  why_it_matters: "Simplicity enhances usability: users can focus on core tasks without distraction【24†L107-L114】. Redundant features or content hinder clarity."
  applies_to: "UI layouts, feature sets, content choices, visual elements."
  use_when: "Comparing design options: choose the one that meets requirements with less clutter. Audit existing interfaces for excess elements."
