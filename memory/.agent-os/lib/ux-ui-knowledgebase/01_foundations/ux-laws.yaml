  sources: ["Laws of UX: Serial Position Effect【16†L36-L44】【16†L42-L50】"]

ux_law_von_restorff:
  title: "Von Restorff Effect"
  category: "UX Laws"
  summary: "Distinctive items are more likely to be remembered【18†L36-L44】."
  definition: "The Von Restorff (Isolation) Effect says an item that stands out (visually or contextually) is recalled better than uniform items【18†L34-L42】."
  why_it_matters: "Use contrast (color, size, motion) to highlight important elements (e.g. ‘Buy’ button) so they draw attention and memory【18†L44-L52】."
  applies_to: "Primary call-to-action buttons, critical alerts, key notifications."
  use_when: "Emphasizing a single critical element (signup, error message)."
  avoid_when: "Overusing contrast on all items (which reduces effect) or using it in non-critical context (distracts)."
  signals_of_good_use: "Users click or note the highlighted item; tasks funnel through the desired action path."
  signals_of_bad_use: "Multiple items use strong styling (buttons, banners) causing confusion; users think it’s an ad."
  tradeoffs: "A highlighted element stands out, but if others change to same style, effectiveness drops. Balance importance."
  related_principles: ["Hierarchy", "Contrast", "Selective Attention"]
  common_mistakes: "Relying solely on color for highlighting (hurts color-blind users)【18†L46-L53】; too many competing highlights."
  examples:
    - "Sale banners often use a bright color different from site palette to stand out."
    - "New or important feature marked with a dot/badge icon to isolate it from others."
  implementation_notes: "Apply visual accent (color, outline, icon) sparingly. Ensure highlighted items have clear labels; test that they are noticed."
  accessibility_notes: "Use more than just color (icons, patterns, text boldness). For motion highlights, provide pause/stop controls for sensitive users【18†L44-L52】."
  agent_rules: "Limit highlighted targets to <2 per view. Prioritize by user goals. Verify contrast ratio and non-color indicators."
