  override_risks: "Violating the law increases cognitive load or error rate."
  required_justification: "State the context and how impact will be measured."
  safer_alternatives: "Use progressive disclosure or additional cues instead of full deviation."
  tags: ["memory_bias", "emotional_design", "user_satisfaction"]
  sources: ["Laws of UX: Peak–End Rule【14†L34-L40】【14†L47-L52】"]

ux_law_serial_position:
  title: "Serial Position Effect"
  category: "UX Laws"
  summary: "Items at the beginning or end of a list are remembered best【16†L36-L44】."
  definition: "The Serial Position Effect implies users recall first (primacy) and last (recency) items in a sequence more easily【16†L36-L44】."
  why_it_matters: "Position important actions/information where they’ll be recalled: often at list edges or first/last items【16†L42-L50】."
  applies_to: "Menus, lists of settings, grouped form fields, navigation links."
  use_when: "Ordering items: place key actions at the start or end (e.g., primary settings first, logout last)."
  avoid_when: "When middle items are equally critical but risk being overlooked (provide multiple access points or search)."
  signals_of_good_use: "Users easily remember and access first/last options; analytics show most clicks on those positions."
  signals_of_bad_use: "Frequently accessed options in middle get less use; confusion about hidden items."
  tradeoffs: "Guardrails: putting secondary actions at ends may push others inward; may need alternative discoverability (search, tips)."
  related_principles: ["Fitts’s Law", "Jakob’s Law"]
  common_mistakes: "Hiding important features in long menus (users forget them)."
  examples:
    - "Settings menus often put ‘Account’ at top and ‘Logout’ at bottom, leveraging primacy and recency."
    - "Alphabet lists (A…Z): A and Z stand out most to users【16†L42-L50】."
  implementation_notes: "Use fixed first/last item positions for critical tasks. Label ends clearly (e.g., ‘Back’ on left, ‘Next’ on right)."
  accessibility_notes: "Screen reader or focus order naturally announces first/last items; ensure context (aria labels) to reinforce position."
  agent_rules: "Always check order of menu items; if changing order, consider user testing or heuristics about position recall."
  confidence: 0.85
