ux_law_pareto:
  title: "Pareto Principle"
  category: "UX Laws"
  summary: "80% of effects come from 20% of causes【22†L34-L42】."
  definition: "The Pareto Principle (80/20 Rule) suggests most outcomes stem from a few inputs. In UX, a minority of features serve the majority of users【22†L42-L50】."
  why_it_matters: "Identify and prioritize the 20% of features or content that deliver 80% of value. Focus design and testing efforts there."
  applies_to: "Feature prioritization, content organization, performance optimization."
  use_when: "Allocating resources: enhance and highlight core use-cases first (e.g. landing page fundamentals over edge-case settings)."
  avoid_when: "Neglecting important minority use-cases without analysis – always validate with data which features fall in the 20%."
  signals_of_good_use: "High usage for prioritized features; positive user feedback on core flows; minimal use of secondary features."
  signals_of_bad_use: "Overinvestment in rarely-used parts; core features bugging out or being overlooked."
  tradeoffs: "Focusing on majority can leave niche needs unmet. Plan for scalable solution to cover less-common 80% eventually."
  related_principles: ["Kano Model", "Impact-Effort Analysis"]
  common_mistakes: "Assuming 80/20 without analytics. Designing for ‘everyone’ equally."
  examples:
    - "Dashboard design: emphasize widgets/reports that 80% of users open daily."
    - "Software onboarding: teach primary path first, not every feature at once."
  implementation_notes: "Use analytics to identify top-used features. Trim or hide peripheral features. Iterate core workflows."
  agent_rules: "Rank features by usage metrics. If unsure, default to Pareto to suggest focus, then adjust with user research."
  confidence: 0.8
  priority: P1
  evidence_level: B
  enforcement: soft
  stability: stable
