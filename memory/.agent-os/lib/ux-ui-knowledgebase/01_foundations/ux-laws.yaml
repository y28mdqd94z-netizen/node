ux_law_doherty:
  title: "Doherty Threshold"
  category: "UX Laws"
  summary: "UX is optimal when system response is within 400ms【30†L36-L44】."
  definition: "The Doherty Threshold posits that productivity and engagement soar if user-system interactions complete within ~400ms【30†L36-L44】."
  why_it_matters: "Fast feedback keeps users in flow【30†L42-L50】. Above ~400ms, users begin to perceive delays, reducing efficiency and satisfaction."
  applies_to: "Interactive operations: button clicks, form submissions, real-time filters, any state change."
  use_when: "Designing responses: aim for instant actions or provide animation/loading cues if delay is unavoidable."
  avoid_when: "Tasks inherently long (e.g. complex report generation) – instead show progress and communicate status."
  signals_of_good_use: "Users feel interface is responsive; no ‘dead’ periods; high throughput of tasks."
  signals_of_bad_use: "Users wait, click multiple times out of impatience, or navigate away during loading."
  tradeoffs: "Strive for speed, but don’t sacrifice information. If action takes >400ms, show skeletons or spinners to keep attention【30†L42-L50】."
  related_principles: ["Feedback & System Status", "Progressive Disclosure", "Visual Feedback"]
  common_mistakes: "No loading indicator on slow calls; showing spinner alone without context."
  examples:
    - "Instant search-as-you-type (within 400ms) keeps engagement vs. separate search button."
    - "Skeleton screen on content loading: gives impression of speed even if data loads in background."
  implementation_notes: "Use asynchronous loading, optimize queries. For inevitable delays, show accurate progress (e.g. percentage)."
  accessibility_notes: "Ensure loading indicators are announced to screen readers. Don’t use rapid flashing animations during progress."
  agent_rules: "Check critical actions for feedback time. Always provide feedback within 400ms or a progress cue."
  confidence: 0.9
  priority: P1
  evidence_level: B
  enforcement: soft
  stability: stable
  override_allowed: true
