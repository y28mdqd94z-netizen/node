  sources: ["Laws of UX: Von Restorff Effect【18†L34-L42】【18†L44-L52】"]

ux_law_zeigarnik:
  title: "Zeigarnik Effect"
  category: "UX Laws"
  summary: "People recall unfinished tasks better than completed ones【20†L36-L43】."
  definition: "The Zeigarnik Effect holds that incomplete tasks remain more salient in memory than finished tasks【20†L34-L38】."
  why_it_matters: "Leverage incomplete-state to motivate completion. Showing progress or incomplete milestones encourages users to finish tasks."
  applies_to: "Onboarding flows, multi-step forms, tutorials, goal tracking."
  use_when: "Encouraging engagement: use progress bars, checklists of tasks where users see unfinished items."
  avoid_when: "If unfinished states cause anxiety (e.g. incomplete profile on social media might discourage use)."
  signals_of_good_use: "Users return to finish tasks, engage with reminders. High completion rates as users close open loops."
  signals_of_bad_use: "Users abandon flows if gap feels too large; confusion if incomplete state not communicated."
  tradeoffs: "Too much focus on incomplete tasks can pressure users. Balance by showing progress positively (points, levels) rather than guilt."
  related_principles: ["Goal Gradient Effect", "Commitment Devices"]
  common_mistakes: "Not showing any sign of progress – e.g., static form with no indicator leaves users blind to completion status."
  examples:
    - "Progress bars in tutorials compel users: seeing 70% done makes them push to 100%."
    - "E-commerce checkout: showing steps (cart→address→payment) reminds users of incomplete steps."
  implementation_notes: "Display clear progress indicators. Offer achievements/badges for completed tasks. Provide save-and-return for long tasks."
  accessibility_notes: "Ensure progress indicators (bars, steps) have text labels or aria roles so assistive tech conveys incomplete state."
  agent_rules: "Include visible progress for any multi-step flow. Prompt users about unfinished items (e.g. cart items, incomplete profile)."
  confidence: 0.8
  priority: P1
  evidence_level: B
  enforcement: soft
  stability: stable
