pattern_customizable_widgets:
  pattern_name: "Customizable Widgets"
  problem_solved: "Allows users to tailor dashboards to their goals."
  context: "Power-user dashboards with diverse roles."
  structure:
    - "Edit mode toggle"
    - "Widget library"
    - "Drag-and-drop grid"
  core_elements: ["Widget cards", "Edit mode", "Grid layout"]
  variants:
    - "Preset layouts"
    - "Role-based defaults"
  best_for: "Multi-role products with varied KPIs."
  avoid_for: "Simple products with one user type."
  desktop_considerations: "Use a stable grid to prevent layout jumps."
  mobile_considerations: "Limit customization to reorder and hide."
  accessibility_notes: "Provide keyboard alternatives to drag-and-drop."
  behaviour_rules: "Autosave changes and provide reset option."
