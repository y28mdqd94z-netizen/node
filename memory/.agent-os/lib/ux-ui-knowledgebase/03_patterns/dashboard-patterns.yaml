pattern_kpi_summary:
  pattern_name: "KPI Summary Dashboard"
  problem_solved: "Provides at-a-glance status of core metrics."
  context: "Executive or team overview screens."
  structure:
    - "Header with time range and filters"
    - "Row of KPI cards"
    - "Primary trend chart"
    - "Secondary breakdown table"
  core_elements: ["KPI cards", "Trend chart", "Filter controls"]
  variants:
    - "Comparison vs previous period"
    - "Segmented KPIs by category"
  best_for: "Monitoring health metrics and anomalies."
  avoid_for: "Deep investigative analysis without drill-down."
  desktop_considerations: "Use a multi-column grid with clear spacing."
  mobile_considerations: "Stack KPIs and collapse charts to summaries."
  accessibility_notes: "Provide text labels and values; avoid color-only indicators."
  behaviour_rules: "Default to the most relevant time range; persist user choice."
  related_components: ["Card", "Chart", "Select"]
  related_principles: ["Visual Hierarchy", "Recognition Over Recall"]
  anti_patterns:
    - "Showing too many KPIs without grouping."
  implementation_notes: "Limit to 5-7 KPIs; offer drill-down for details."
  evaluation_criteria:
    - "Users can identify status within 10 seconds."
  priority: P2
  evidence_level: C
  confidence: 0.65
  enforcement: soft
  stability: stable
  context_tags: [dashboard, pattern]
  override_allowed: true
  override_conditions: "Use an alternative pattern if user goals or platform constraints conflict."
  override_risks: "Pattern mismatch reduces discoverability or increases errors."
  required_justification: "Explain the context conflict and mitigation."
  safer_alternatives: "Select a pattern from the same category that fits the constraints."
  decision_checks:
    - "Users can identify status within 10 seconds."
