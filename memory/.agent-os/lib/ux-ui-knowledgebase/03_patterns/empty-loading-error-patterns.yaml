pattern_no_results:
  pattern_name: "No Results"
  problem_solved: "Clarifies search results when nothing matches."
  context: "Search and filter views."
  structure:
    - "No results message"
    - "Suggestion to modify filters"
    - "Reset action"
  core_elements: ["Message", "Button", "Suggestions"]
  variants:
    - "Alternative recommendations"
  best_for: "Filtered views and search pages."
  avoid_for: "New users with no content yet (use empty state)."
  desktop_considerations: "Suggest filters to remove."
  mobile_considerations: "Use concise copy."
  accessibility_notes: "Ensure message is announced."
  behaviour_rules: "Provide reset or broaden search action."
  related_components: ["Button", "Chip"]
  related_principles: ["Recognition Over Recall"]
  anti_patterns:
    - "No results with no suggestion."
  implementation_notes: "Show most common filters to remove."
