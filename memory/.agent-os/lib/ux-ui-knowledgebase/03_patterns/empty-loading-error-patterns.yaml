pattern_empty_state:
  pattern_name: "Empty State"
  problem_solved: "Guides users when there is no content yet."
  context: "First-time use or newly created spaces."
  structure:
    - "Clear message"
    - "Illustration or icon"
    - "Primary action"
  core_elements: ["Message", "Illustration", "CTA"]
  variants:
    - "Checklist-style empty state"
  best_for: "New accounts or empty lists."
  avoid_for: "Temporary empty results after filters."
  desktop_considerations: "Use moderate illustration sizes."
  mobile_considerations: "Keep copy short and action clear."
  accessibility_notes: "Provide alt text for illustrations."
  behaviour_rules: "Offer a clear next step."
  related_components: ["Empty state", "Button"]
  related_principles: ["Guidance", "Recognition Over Recall"]
  anti_patterns:
    - "Empty state with no action or explanation."
  implementation_notes: "Tailor copy based on user role."
  evaluation_criteria:
    - "Users take the next action."
  priority: P2
  evidence_level: C
  confidence: 0.65
  enforcement: soft
  stability: stable
  context_tags: [empty, loading, error, pattern]
  override_allowed: true
  override_conditions: "Use an alternative pattern if user goals or platform constraints conflict."
  override_risks: "Pattern mismatch reduces discoverability or increases errors."
  required_justification: "Explain the context conflict and mitigation."
  safer_alternatives: "Select a pattern from the same category that fits the constraints."
  decision_checks:
    - "Users take the next action."
pattern_loading_skeleton:
  pattern_name: "Skeleton Loading"
  problem_solved: "Improves perceived performance while content loads."
  context: "Content-heavy screens and dashboards."
  structure:
    - "Placeholder shapes"
    - "Subtle animation"
  core_elements: ["Skeleton blocks", "Shimmer"]
  variants:
    - "Static placeholder"
  best_for: "Predictable content layouts."
  avoid_for: "Short loads under 200ms."
  desktop_considerations: "Match final content layout."
  mobile_considerations: "Reduce shimmer intensity."
  accessibility_notes: "Announce loading state to screen readers."
  behaviour_rules: "Replace with real content without layout shift."
  related_components: ["Skeleton", "Spinner"]
  related_principles: ["Doherty Threshold"]
  anti_patterns:
    - "Skeletons that do not match actual layout."
  implementation_notes: "Limit animation to reduce motion."
  evaluation_criteria:
    - "Users perceive the UI as responsive."
  priority: P2
  evidence_level: C
  confidence: 0.65
  enforcement: soft
  stability: stable
  context_tags: [empty, loading, error, pattern]
  override_allowed: true
  override_conditions: "Use an alternative pattern if user goals or platform constraints conflict."
  override_risks: "Pattern mismatch reduces discoverability or increases errors."
  required_justification: "Explain the context conflict and mitigation."
  safer_alternatives: "Select a pattern from the same category that fits the constraints."
  decision_checks:
    - "Users perceive the UI as responsive."
pattern_error_state:
