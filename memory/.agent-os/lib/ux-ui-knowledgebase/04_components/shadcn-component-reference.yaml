  variants: ["single", "multiple", "bordered"]
  use_when: "Multiple related sections can be expanded or collapsed by the user."
  avoid_when: "Users must compare items side by side or content must always be visible."
  dos:
    - "Use short, descriptive headings for triggers."
    - "Indicate expanded state with icon or motion."
  donts:
