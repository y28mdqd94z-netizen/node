version: 1
entries:
  - id: maint.cadence.volatility-mapping
    title: Volatility to cadence mapping
    category: maintenance
    summary: Map volatility to review cadence.
    definition: Low volatility entries are reviewed yearly; medium quarterly; high monthly or on events.
    why_it_matters: Keeps guidance current without excessive overhead.
    priority_level: P1
    confidence_score: 0.78
    evidence_level: medium
    knowledge_layer: stable_core
    volatility_level: low
    freshness_requirement: none
    use_when:
      - scheduling review cycles
    avoid_when:
      - none
    implementation_rules:
      - apply cadence based on volatility_level
      - adjust cadence for critical systems
    tradeoffs:
      - requires ongoing maintenance planning
    anti_patterns:
      - treating all entries the same
    override_allowed: true
    override_conditions:
      - evidence that cadence should change
    override_risks:
      - stale or over-maintained guidance
    required_justification:
      - rationale for changed cadence
    safer_alternatives:
      - partial review with focused scope
    performance_impact: neutral
    security_impact: neutral
    cost_impact: maintenance effort
    agent_rules:
      - follow cadence unless evidence suggests change
    last_verified: 2026-03-29
    verification_method: internal_review
    update_triggers:
      - recurring stale guidance issues
    deprecation_signals:
      - new maintenance policy adopted
    sources:
      - Knowledge management practices
  - id: maint.cadence.verification-methods
    title: Verification methods
    category: maintenance
    summary: Define how entries are verified.
    definition: Use live verification for volatile entries and documented review for stable ones.
    why_it_matters: Ensures high accuracy where change is frequent.
    priority_level: P1
    confidence_score: 0.76
    evidence_level: medium
    knowledge_layer: stable_core
    volatility_level: low
    freshness_requirement: none
    use_when:
      - verifying guidance before use
    avoid_when:
      - none
    implementation_rules:
      - volatile entries require live verification
      - stable entries require periodic review
    tradeoffs:
      - additional time for verification
    anti_patterns:
      - using volatile guidance without checking
    override_allowed: true
    override_conditions:
      - live verification is impossible but risk is low
    override_risks:
      - outdated guidance used in implementation
    required_justification:
      - evidence that risk is acceptable
    safer_alternatives:
      - choose stable_core alternatives
    performance_impact: neutral
    security_impact: positive
    cost_impact: moderate review cost
    agent_rules:
      - verify volatile entries before implementation
    last_verified: 2026-03-29
    verification_method: internal_review
    update_triggers:
      - verification failures
    deprecation_signals:
      - new verification tooling adopted
    sources:
      - Knowledge management practices
